<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SlayyX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
    <div class="bg-blur-overlay"></div>

    <!-- NEW TOP CONTROLS: Grouped neatly together -->
    <div class="top-right-controls">
        <button class="top-circle-btn" id="socialUserBtn"><img src="user.png" alt="U" onerror="this.style.display='none'"></button>
        <button class="top-circle-btn" id="socialNotiBtn"><img src="noti.png" alt="N" onerror="this.style.display='none'"></button>
        <button class="top-circle-btn" id="closeBtn" aria-label="Close"><img src="close.png" alt="X" onerror="this.style.display='none'"></button>
    </div>

    <main class="top-section">
        <div class="greeting-container" id="mainGreeting">
            <h1 class="greeting-text">Hey,</h1>
            <h2 class="user-name" id="userName">User</h2>
        </div>
    </main>
    
    <!-- ========================================= -->
    <!-- GLOBAL THREADS WIDGET (CENTER SCREEN)     -->
    <!-- ========================================= -->
    <section class="threads-widget" id="mainThreads">
        <div class="threads-glass-box" id="threadsGlassBox">
            
            <!-- NEW: Top Left Delete Icon -->
            <button id="deleteModeBtn" class="delete-mode-toggle-btn">
                <img src="delete.png" alt="Delete">
            </button>

            <button class="box-toggle-btn" id="toggleThreadsBtn"></button>
            <div class="threads-header">
                <img src="clear.png" alt="Public Feed" class="threads-label-icon">
            </div>
            <div class="threads-feed" id="threadsFeedContainer">
                <div style="text-align:center; opacity:0.5; font-size:0.9rem; margin-top:20px;">
                    Login to view threads
                </div>
            </div>
            
            <div class="reply-preview-banner" id="replyPreviewBanner" style="display: none;">
                <div class="reply-preview-content">
                    <span class="reply-target-name" id="replyTargetName">Replying to...</span>
                    <span class="reply-target-snippet" id="replyTargetSnippet">Snippet</span>
                </div>
                <button id="cancelReplyBtn" class="cancel-reply-btn">✖</button>
            </div>
            
            <div class="threads-input-wrapper">
                <!-- Standard Input -->
                <input type="text" id="threadInput" class="thread-input" placeholder="Drop a thought..." autocomplete="off">
                <button id="threadSendBtn" class="thread-send">
                    <img src="send.png" alt="Send">
                </button>

                <!-- NEW: Frosted Glass Delete Action Bar (Hidden by default) -->
                <div id="deleteActionBar" class="frosted-delete-bar" style="display: none;">
                    <button id="executeDeleteBtn" class="execute-delete-btn">
                        Delete (0)
                    </button>
                    <button id="cancelDeleteBtn" class="cancel-delete-btn">
                        <img src="cross.png" alt="Cancel">
                    </button>
                </div>
            </div>

            <div class="future-quotes-box" id="futureQuotesBox">
                Quotes coming soon ✨
            </div>
        </div>
    </section>
    
    <section class="bottom-section" id="mainBottom">
        <div class="vertical-icons">
            <button class="side-btn" id="spotifyBtn" aria-label="Spotify" style="display: none;">
                <img src="spotify.png" alt="Spotify">
            </button>
            <button class="side-btn" id="pinterestBtn" aria-label="Pinterest" style="display: none;">
                <img src="pinterest.png" alt="Pinterest">
            </button>
            <button class="side-btn" id="extraBtn" aria-label="Action 3" style="display: none;"></button>
        </div>
    </section>

    <nav class="dockbar" id="mainDock">
        <button class="dock-btn" id="loginBtn" aria-label="Cloud feature"><img src="cloud.png" alt="Cloud"></button>
        <button class="dock-btn" id="dropsBtn" aria-label="Ribbon feature"><img src="ribbon.png" alt="Ribbon"></button>
        <button class="dock-btn" id="settingsBtn" aria-label="Settings"><img src="settings.png" alt="Settings"></button>
        <button class="dock-btn" id="wallpaperBtn" aria-label="Change Theme"><img src="theme.png" alt="Theme"></button>
    </nav>

    <!-- ========================================= -->
    <!-- LOGIN INTERFACE                           -->
    <!-- ========================================= -->
    <div class="login-wrapper" id="loginWrapper">
        <div class="login-box">
            <h2 class="login-title">Welcome Back</h2>
            <input type="text" id="emailInput" class="login-input" placeholder="Email or Username" autocomplete="off">
            <input type="password" id="passInput" class="login-input" placeholder="Password">
            <button class="login-submit" id="submitLogin">Okie</button>
        </div>
    </div>
    
    <!-- ========================================= -->
    <!-- DIRECT MESSAGES INTERFACE                 -->
    <!-- ========================================= -->
    <div class="dm-wrapper" id="dmWrapper">
        <div class="dm-header-glass">
            <input type="text" id="dmSearch" class="dm-search" placeholder="Search by username or email..." autocomplete="off">
        </div>
        <div class="dm-list" id="dmListContainer"></div>
        <div class="chat-room" id="chatRoom">
            <div class="chat-header"><h3 class="chat-title" id="activeChatTitle">Chat</h3></div>
            <div class="chat-messages" id="chatMessagesContainer"></div>
            <div class="chat-input-container">
                <input type="text" id="chatInputField" class="chat-input" placeholder="Type a message..." autocomplete="off">
                <button class="chat-send" id="chatSendBtn"><img src="send.png" alt="Send"></button>
            </div>
        </div> 
    </div> 

    <!-- ========================================= -->
    <!-- SETTINGS INTERFACE (PROFILE ONLY)         -->
    <!-- ========================================= -->
    <div class="settings-wrapper" id="settingsWrapper">
        <div class="settings-box">
            <h2 class="login-title">Your Profile</h2>
            <div class="pfp-section">
                <div class="pfp-circle"><img src="cloud.png" id="pfpPreview" alt="Profile Picture"></div>
                <input type="file" id="pfpInput" accept="image/*" style="display: none;">
                <button class="change-pfp-btn" id="changePfpBtn">Change Avatar</button>
            </div>
            <div class="username-section">
                <input type="text" id="usernameInput" class="login-input" placeholder="Unique Username" autocomplete="off">
            </div>
            <button class="login-submit" id="saveSettingsBtn">Save Profile</button>
            <button class="logout-btn" id="logoutBtn">Log Out</button>
        </div>
    </div>

    <!-- ========================================= -->
    <!-- NEW: SOCIAL HUB (FRIENDS, SEARCH, NOTIFS) -->
    <!-- ========================================= -->
    <div class="social-wrapper" id="socialWrapper">
        <div class="social-box">
            <div class="social-tabs">
                <button class="social-tab active" data-tab="search">Search</button>
                <button class="social-tab" data-tab="friends">Friends</button>
                <button class="social-tab" data-tab="requests">Requests</button>
            </div>
            <div class="social-content" id="socialContentArea">
                <!-- Content injected here by Javascript -->
            </div>
        </div>
    </div>

    <!-- ========================================= -->
    <!-- PHOTO DROPS INTERFACE (THE STACKS)        -->
    <!-- ========================================= -->
    <div class="drops-wrapper" id="dropsWrapper">
        <div class="drops-header">
            <h2 class="drops-title" id="dropsTitle">Dropped by - User</h2>
        </div>
        <div class="drops-stack-container" id="dropsStackContainer"></div>
        <div class="drop-search-results" id="dropSearchResults"></div>
        <div class="drops-controls-container">
            <input type="text" id="dropSearch" class="drop-search-input" placeholder="Search for users..." autocomplete="off">
            <div class="drop-actions">
                <!-- UPDATED BUTTONS: Emojis removed, PNGs added, Erase hidden by default -->
                <button class="drop-action-btn" id="pickNclickBtn">PickNclick <img src="cam.png" alt="cam"></button>
                <button class="drop-action-btn erase-btn" id="eraseDropBtn" style="display: none;">Erase <img src="vanish.png" alt="erase"></button>
                <input type="file" id="dropFileInput" accept="image/*" style="display: none;">
            </div>
        </div>
    </div>

    <!-- ========================================= -->
    <!-- ========================================= -->
    <!-- WALLPAPER MODAL                           -->
    <!-- ========================================= -->
    <div class="modal-overlay" id="themeModal">
        <div class="modal-content">
            <button class="wallpaper-option" data-bg="black.jpg">W1</button>
            <button class="wallpaper-option" data-bg="white.jpg">W2</button>
            <button class="wallpaper-option" data-bg="pink.jpg">W3</button>
            <button class="wallpaper-option" data-bg="beige.jpg">W4</button>
            <button class="wallpaper-option" data-bg="crimson.jpg">W5</button>
            <button class="wallpaper-option" data-bg="ocean.jpg">W6</button>
            <button class="wallpaper-option" data-bg="rexgreen.jpg">W7</button>
            <button class="wallpaper-option" data-bg="cookiegreen.jpg">W8</button>
        </div>
    </div>


    <script type="module" src="script.js"></script>

</body>
</html>
